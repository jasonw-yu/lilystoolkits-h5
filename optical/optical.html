<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光模块计算器 - LilysToolKits</title>
    <link rel="stylesheet" href="../home/style.css">
    <link rel="stylesheet" href="optical.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- 头部导航 -->
        <header class="app-header">
            <div class="header-content">
                <div class="nav-bar">
                    <a href="../home/index.html" class="back-button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        <span>返回首页</span>
                    </a>
                    <div class="page-title">
                        <span class="page-icon">💡</span>
                        <h1>光模块计算器</h1>
                    </div>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="app-main">
            <div class="container">
                <!-- DDM参数转换 -->
                <div class="calculator-card">
                    <div class="card-header">
                        <div class="card-icon">🌡️</div>
                        <div class="card-title">
                            <h2>DDM 参数转换</h2>
                            <p>数字诊断监控参数转换</p>
                        </div>
                    </div>

                    <div class="param-grid">
                        <!-- 温度 -->
                        <div class="param-item">
                            <div class="param-label">温度 (℃)</div>
                            <div class="param-inputs">
                                <input class="input" type="number" id="temperature" placeholder="温度值" step="0.001">
                                <span class="input-separator">⇄</span>
                                <input class="input hex-input" type="text" id="tempHex" placeholder="寄存器值">
                                <button class="convert-btn" onclick="convertTemp()">转换</button>
                            </div>
                        </div>

                        <!-- 电压 -->
                        <div class="param-item">
                            <div class="param-label">电压 (V)</div>
                            <div class="param-inputs">
                                <input class="input" type="number" id="voltage" placeholder="电压值" step="0.001">
                                <span class="input-separator">⇄</span>
                                <input class="input hex-input" type="text" id="voltHex" placeholder="寄存器值">
                                <button class="convert-btn" onclick="convertVolt()">转换</button>
                            </div>
                        </div>

                        <!-- 偏置电流 -->
                        <div class="param-item">
                            <div class="param-label">偏置电流 (mA)</div>
                            <div class="param-inputs">
                                <input class="input" type="number" id="current" placeholder="电流值" step="0.001">
                                <span class="input-separator">⇄</span>
                                <input class="input hex-input" type="text" id="currentHex" placeholder="寄存器值">
                                <button class="convert-btn" onclick="convertCurrent()">转换</button>
                            </div>
                        </div>

                        <!-- 光功率 -->
                        <div class="param-item">
                            <div class="param-label">光功率 (dBm)</div>
                            <div class="param-inputs">
                                <input class="input" type="number" id="power" placeholder="功率值" step="0.001">
                                <span class="input-separator">⇄</span>
                                <input class="input hex-input" type="text" id="powerHex" placeholder="寄存器值">
                                <button class="convert-btn" onclick="convertPower()">转换</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- BER/SNR转换 -->
                <div class="calculator-card">
                    <div class="card-header">
                        <div class="card-icon">📊</div>
                        <div class="card-title">
                            <h2>BER/SNR 转换</h2>
                            <p>误码率与信噪比转换</p>
                        </div>
                    </div>

                    <div class="param-grid">
                        <!-- BER -->
                        <div class="param-item">
                            <div class="param-label">误码率 (BER)</div>
                            <div class="param-inputs">
                                <input class="input" type="text" id="ber" placeholder="如: 1.0e-12">
                                <span class="input-separator">⇄</span>
                                <input class="input hex-input" type="text" id="berHex" placeholder="寄存器值">
                                <button class="convert-btn" onclick="convertBer()">转换</button>
                            </div>
                        </div>

                        <!-- SNR -->
                        <div class="param-item">
                            <div class="param-label">信噪比 (SNR)</div>
                            <div class="param-inputs">
                                <input class="input" type="number" id="snr" placeholder="SNR值(dB)" step="0.01">
                                <span class="input-separator">⇄</span>
                                <input class="input hex-input" type="text" id="snrHex" placeholder="寄存器值">
                                <button class="convert-btn" onclick="convertSnr()">转换</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 光功率单位转换 -->
                <div class="calculator-card">
                    <div class="card-header">
                        <div class="card-icon">⚡</div>
                        <div class="card-title">
                            <h2>光功率单位转换</h2>
                            <p>mW 与 dBm 相互转换</p>
                        </div>
                    </div>

                    <div class="param-grid">
                        <div class="param-item">
                            <div class="param-label">功率转换</div>
                            <div class="param-inputs">
                                <input class="input" type="number" id="mw" placeholder="mW值" step="0.001">
                                <span class="input-separator">⇄</span>
                                <input class="input" type="number" id="dbm" placeholder="dBm值" step="0.001">
                                <button class="convert-btn" onclick="convertPowerUnit()">转换</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 可靠性单位转换 -->
                <div class="calculator-card">
                    <div class="card-header">
                        <div class="card-icon">🔧</div>
                        <div class="card-title">
                            <h2>可靠性单位转换</h2>
                            <p>FIT 与 PPM 相互转换</p>
                        </div>
                    </div>

                    <div class="param-grid">
                        <div class="param-item">
                            <div class="param-label">可靠性转换</div>
                            <div class="param-inputs">
                                <input class="input" type="number" id="fit" placeholder="FIT值" step="0.001">
                                <span class="input-separator">⇄</span>
                                <input class="input" type="number" id="ppm" placeholder="PPM值" step="0.001">
                                <button class="convert-btn" onclick="convertReliability()">转换</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 清空按钮 -->
                <div class="action-buttons">
                    <button class="btn btn-danger" onclick="clearAll()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                        <span>清空所有</span>
                    </button>
                </div>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="app-footer">
            <div class="footer-content">
                <p>Copyright © 2024 <a href="https://gitee.com/jinwyu" target="_blank">Lily's Tool Kits</a></p>
            </div>
        </footer>
    </div>

    <script src="optical.js"></script>
</body>
</html>
