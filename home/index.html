<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LilysToolKits - 个人工具箱</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧰</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- 头部导航 -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">🧰</div>
                    <div class="logo-text">
                        <h1>LilysToolKits</h1>
                        <span class="version-badge">v1.0.2</span>
                    </div>
                </div>
                <div class="header-subtitle">轻量级离线工具集合</div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="app-main">
            <div class="container">
                <!-- 工具网格 -->
                <div class="tools-grid" id="toolsGrid">
                    <!-- 工具卡片将由JavaScript动态生成 -->
                </div>

                <!-- 特性说明 -->
                <div class="features-section">
                    <div class="feature-item">
                        <div class="feature-icon">🌐</div>
                        <div class="feature-text">
                            <h3>离线优先</h3>
                            <p>无需网络连接,随时随地使用</p>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🔒</div>
                        <div class="feature-text">
                            <h3>数据安全</h3>
                            <p>所有数据处理均在本地完成</p>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">⚡</div>
                        <div class="feature-text">
                            <h3>高性能</h3>
                            <p>纯前端实现,响应速度快</p>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">📱</div>
                        <div class="feature-text">
                            <h3>响应式</h3>
                            <p>完美适配桌面和移动设备</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="app-footer">
            <div class="footer-content">
                <p>Copyright © 2024 <a href="https://gitee.com/jinwyu" target="_blank">Lily's Tool Kits</a></p>
                <p class="footer-links">
                    <a href="https://gitee.com/jinwyu/lilystoolkits-h5" target="_blank">Gitee</a>
                    <span class="separator">•</span>
                    <a href="https://gitee.com/jinwyu/lilystoolkits-h5/issues" target="_blank">反馈</a>
                    <span class="separator">•</span>
                    <a href="https://gitee.com/jinwyu/lilystoolkits-h5/blob/main/LICENSE" target="_blank">GPL-3.0</a>
                </p>
            </div>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
