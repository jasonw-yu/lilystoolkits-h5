<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进制转换器 - LilysToolKits</title>
    <link rel="stylesheet" href="../home/style.css">
    <link rel="stylesheet" href="converter.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- 头部导航 -->
        <header class="app-header">
            <div class="header-content">
                <div class="nav-bar">
                    <a href="../home/index.html" class="back-button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        <span>返回首页</span>
                    </a>
                    <div class="page-title">
                        <span class="page-icon">🔢</span>
                        <h1>进制转换器</h1>
                    </div>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="app-main">
            <div class="container">
                <div class="converter-card">
                    <!-- 进制选择 -->
                    <div class="base-selector">
                        <div class="selector-label">选择输入进制</div>
                        <div class="btn-group">
                            <button class="btn btn-active" data-base="10">
                                <span class="btn-label">十进制</span>
                                <span class="btn-hint">DEC</span>
                            </button>
                            <button class="btn" data-base="16">
                                <span class="btn-label">十六进制</span>
                                <span class="btn-hint">HEX</span>
                            </button>
                            <button class="btn" data-base="2">
                                <span class="btn-label">二进制</span>
                                <span class="btn-hint">BIN</span>
                            </button>
                        </div>
                    </div>

                    <!-- 输入区域 -->
                    <div class="input-section">
                        <div class="input-label">输入数值</div>
                        <input type="text" id="inputValue" class="input-box" placeholder="请输入数值" autocomplete="off">
                    </div>

                    <!-- 结果显示 -->
                    <div class="results-section">
                        <div class="result-card">
                            <div class="result-header">
                                <span class="result-label">十进制 (DEC)</span>
                                <button class="copy-btn" data-target="decimalValue" title="复制">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                </button>
                            </div>
                            <div class="result-value" id="decimalValue">
                                <span class="result-placeholder">待输入</span>
                            </div>
                        </div>

                        <div class="result-card">
                            <div class="result-header">
                                <span class="result-label">十六进制 (HEX)</span>
                                <button class="copy-btn" data-target="hexValue" title="复制">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                </button>
                            </div>
                            <div class="result-value" id="hexValue">
                                <span class="result-placeholder">待输入</span>
                            </div>
                        </div>

                        <div class="result-card">
                            <div class="result-header">
                                <span class="result-label">二进制 (BIN)</span>
                                <button class="copy-btn" data-target="binaryValue" title="复制">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                </button>
                            </div>
                            <div class="result-value" id="binaryValue">
                                <span class="result-placeholder">待输入</span>
                            </div>
                        </div>
                    </div>

                    <!-- 数字键盘 -->
                    <div class="keypad-section">
                        <div class="keypad-title">数字键盘</div>
                        <div class="keypad-grid">
                            <button class="keypad-btn" data-value="7">7</button>
                            <button class="keypad-btn" data-value="8">8</button>
                            <button class="keypad-btn" data-value="9">9</button>
                            <button class="keypad-btn keypad-btn-danger" id="deleteBtn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
                                    <line x1="18" y1="9" x2="12" y2="15"></line>
                                    <line x1="12" y1="9" x2="18" y2="15"></line>
                                </svg>
                            </button>

                            <button class="keypad-btn" data-value="4">4</button>
                            <button class="keypad-btn" data-value="5">5</button>
                            <button class="keypad-btn" data-value="6">6</button>
                            <button class="keypad-btn keypad-btn-warning" id="clearBtn">CLR</button>

                            <button class="keypad-btn" data-value="1">1</button>
                            <button class="keypad-btn" data-value="2">2</button>
                            <button class="keypad-btn" data-value="3">3</button>
                            <button class="keypad-btn" data-value="A">A</button>

                            <button class="keypad-btn" data-value="0">0</button>
                            <button class="keypad-btn" data-value="B">B</button>
                            <button class="keypad-btn" data-value="C">C</button>
                            <button class="keypad-btn" data-value="D">D</button>

                            <button class="keypad-btn" data-value="E">E</button>
                            <button class="keypad-btn" data-value="F">F</button>
                            <button class="keypad-btn keypad-btn-empty"></button>
                            <button class="keypad-btn keypad-btn-empty"></button>
                        </div>
                    </div>

                    <!-- 使用提示 -->
                    <div class="tips-section">
                        <div class="tips-title">使用提示</div>
                        <ul class="tips-list">
                            <li>十进制: 输入 0-9 的数字</li>
                            <li>十六进制: 输入 0-9 和 A-F (不区分大小写)</li>
                            <li>二进制: 只能输入 0 和 1</li>
                            <li>支持大数值转换 (最大 2^53-1)</li>
                            <li>二进制结果每 4 位一组显示</li>
                        </ul>
                    </div>
                </div>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="app-footer">
            <div class="footer-content">
                <p>Copyright © 2024 <a href="https://gitee.com/jinwyu" target="_blank">Lily's Tool Kits</a></p>
            </div>
        </footer>
    </div>

    <script src="converter.js"></script>
</body>
</html>
